stages:
  - security
  - build
  - image-scan
  - sign
  - verify
  - deploy

variables:
  IMAGE_NAME: harbor.local/portifolio-devops/demo-app
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

gitleaks:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect
      --source .
      --verbose
      --log-level debug
      --redact
      --log-opts="--all --full-history"
      --report-format sarif
      --report-path gitleaks-report.sarif
      --max-decode-depth 5
      --no-git 
  artifacts:
    when: always
    paths:
      - gitleaks-report.sarif
    expire_in: 7 days
  allow_failure: false
  only:
    - merge_requests
    - main

semgrep-sast:
  stage: security
  image: returntocorp/semgrep:latest
  needs:
    - gitleaks
  variables:
    SEMGREP_IN_DOCKER: "1"
    SEMGREP_APP_TOKEN: ""
  script:
    - semgrep scan --config=auto --error $CI_PROJECT_DIR
  allow_failure: true
  only:
    - merge_requests
    - main

trivy-sca:
  stage: security
  image: aquasec/trivy:latest
  needs:
    - semgrep-sast
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 1 --no-progress .
  allow_failure: false
  only:
    - merge_requests
    - main

build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"harbor.local\":{\"username\":\"$HARBOR_USER\",\"password\":\"$HARBOR_PASS\"}}}" > /kaniko/.docker/config.json
    - >
      /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/Dockerfile
      --destination $IMAGE_NAME:$IMAGE_TAG
      --skip-tls-verify
      --insecure
  only:
    - main

trivy-image:
  stage: image-scan
  image: aquasec/trivy:latest
  script:
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"harbor.local\":{\"username\":\"$HARBOR_USER\",\"password\":\"$HARBOR_PASS\"}}}" > ~/.docker/config.json
    - trivy image --severity HIGH,CRITICAL --exit-code 1 --no-progress $IMAGE_NAME:$IMAGE_TAG
  allow_failure: true
  needs:
    - build-image
  only:
    - main

sign_image:
  stage: sign
  image:
    name: bitnami/cosign:latest
    entrypoint: [""]
  needs:
    - trivy-image
  before_script:
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"harbor.local\":{\"username\":\"$HARBOR_USER\",\"password\":\"$HARBOR_PASS\"}}}" > ~/.docker/config.json
  script:
    - echo "$COSIGN_PRIVATE_KEY" > cosign.key
    - export COSIGN_PASSWORD=$COSIGN_PASSWORD
    - cosign sign --key cosign.key $IMAGE_NAME:$IMAGE_TAG
  only:
    - main

verify-image:
  stage: verify
  image: 
    name: bitnami/cosign:latest
    entrypoint: [""]
  needs:
    - sign_image
  allow_failure: false
  before_script:
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"harbor.local\":{\"username\":\"$HARBOR_USER\",\"password\":\"$HARBOR_PASS\"}}}" > ~/.docker/config.json
  script:
    - cosign verify --key $COSIGN_PUBLIC_KEY $IMAGE_NAME:$IMAGE_TAG
  only:
    - main

deploy:
  stage: deploy
  image: alpine/helm:3.12.0
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - >
      helm upgrade --install demo-app ./helm/demo-app 
      -n apps-dev 
      --create-namespace 
      -f ./helm/demo-app/values-dev.yaml 
      --set image.repository=$IMAGE_NAME 
      --set image.tag=$IMAGE_TAG 
      --atomic 
      --wait 
      --timeout 5m
  only:
    - main
