gitleaks:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect
      --source .
      --verbose
      --log-level debug
      --redact
      --log-opts="--all --full-history"
      --report-format sarif
      --report-path gitleaks-report.sarif
      --max-decode-depth 5
      --no-git 
  artifacts:
    when: always
    paths:
      - gitleaks-report.sarif
    expire_in: 7 days
  allow_failure: false
  only:
    - merge_requests
    - main