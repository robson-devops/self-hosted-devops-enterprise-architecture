apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-staging
  namespace: argocd
spec:
  project: business-project

  source:
    repoURL: https://github.com/SEU-USUARIO/self-hosted-devops-enterprise-architecture.git
    targetRevision: main
    path: examples/demo-app/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  # ⚠️ Sem sync automático em staging
  syncPolicy: {}