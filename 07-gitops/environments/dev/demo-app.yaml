apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-dev
  namespace: argocd
spec:
  project: business-project

  source:
    repoURL: https://github.com/robson-devops/self-hosted-devops-enterprise-architecture.git
    targetRevision: main
    path: examples/demo-app-argocd/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: apps-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true