apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-platform
  namespace: argocd
spec:
  project: platform-project

  source:
    repoURL: https://github.com/robson-devops/self-hosted-devops-enterprise-architecture.git
    targetRevision: main
    path: 07-gitops/environments

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true