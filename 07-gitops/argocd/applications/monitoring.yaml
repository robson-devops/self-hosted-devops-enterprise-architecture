apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: platform-project

  source:
    repoURL: https://github.com/robson-devops/self-hosted-devops-enterprise-architecture.git
    targetRevision: main
    path: 08-observability

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true